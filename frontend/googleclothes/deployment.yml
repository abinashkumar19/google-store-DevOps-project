apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googleclothes:493901c51bdd3b1ef3d4f7a9fff43531705f026a
        ports:
        - containerPort: 80
