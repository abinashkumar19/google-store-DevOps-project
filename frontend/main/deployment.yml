apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-main:49292b06c5860a34f61d93551cc14c16f0a71cff
        ports:
        - containerPort: 80

