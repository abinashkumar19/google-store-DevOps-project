apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-main:c8c93e1cf77a085734cb73539ceb250bb6944999
        ports:
        - containerPort: 80

