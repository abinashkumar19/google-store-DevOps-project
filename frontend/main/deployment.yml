      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-main:0cd7af317caa645d6c1c849f6709e5d33bb911e4
        ports:
        - containerPort: 80

