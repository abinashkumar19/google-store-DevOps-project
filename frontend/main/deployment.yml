      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-main:70514fa11bf5ac7b057e9de1c3dcf88ed3ad5a9c
        ports:
        - containerPort: 80

