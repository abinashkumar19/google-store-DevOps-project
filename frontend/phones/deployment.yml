    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-phones:99389b8706dd1bdcbfe7453564c58f2a4962dacc
        ports:
        - containerPort: 80
