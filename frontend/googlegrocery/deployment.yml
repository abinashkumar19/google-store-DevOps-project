apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlegrocery:9d7ccd8eb52604e0f83b42d85303532f69683799
        ports:
        - containerPort: 80
