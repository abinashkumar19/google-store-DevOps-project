apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlegrocery:63474aa669cbd97ef1854dae2e61b1b9c6818314
        ports:
        - containerPort: 80
