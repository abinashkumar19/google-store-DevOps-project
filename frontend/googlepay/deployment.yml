apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlepay:34ac893151b8ca637da1eb3019dce7f0b66072b0
        ports:
        - containerPort: 80
