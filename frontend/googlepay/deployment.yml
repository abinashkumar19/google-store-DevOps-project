apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlepay:6a3aa5d08dbc7536b7e1d89368880bfce3400e27
        ports:
        - containerPort: 80
