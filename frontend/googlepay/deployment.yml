apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlepay:94bed7118999c52230a14ab82712affffda8f4f7
        ports:
        - containerPort: 80
