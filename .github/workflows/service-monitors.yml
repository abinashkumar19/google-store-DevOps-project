# ServiceMonitors — Prometheus auto-scrapes all your shopping-site services
# These go in your Git repo under: monitoring/prometheus/service-monitors.yml
# ArgoCD will apply them automatically

---
# Scrape all frontend services in the "google" namespace
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: shopping-frontend-monitor
  namespace: monitoring
  labels:
    release: prometheus   # must match kube-prometheus-stack release name
spec:
  namespaceSelector:
    matchNames:
      - google            # your app namespace
  selector:
    matchLabels: {}       # match ALL services in "google" namespace
  endpoints:
    - port: http          # port name in your Service spec
      path: /metrics
      interval: 15s

---
# Scrape backend service separately
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: shopping-backend-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - google
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s

---
# Pod-level metrics for all pods in google namespace
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: shopping-pods-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - google
  selector:
    matchLabels: {}
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
