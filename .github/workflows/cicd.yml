name: CI/CD for Shopping Site (Frontend + Backend)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com
  FRONTEND_SERVICES: "main electronics phones computers earphones googlemusic googlepay googleclothes googlegrocery"
  BACKEND_SERVICE: "backend"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🛠 Build and Push Docker Images
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"

          # --- Frontend Services ---
          for service in $FRONTEND_SERVICES; do
            FOLDER="frontend/$service"
            REPO_NAME="shopping-site-$service"
            IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

            if [ ! -f "$FOLDER/Dockerfile" ]; then
              echo "⚠️ No Dockerfile in $FOLDER, skipping..."
              continue
            fi

            echo "🚀 Building $service..."
            aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$REPO_NAME"

            docker build -t "$IMAGE_URI" "$FOLDER"
            docker push "$IMAGE_URI"

            # ✅ FIX: Target only lines starting with `image:` (with optional spaces),
            # avoiding corruption of imagePullPolicy, imagePullSecrets, etc.
            sed -i "s|^\(\s*image:\s*\).*|\1$IMAGE_URI|" "$FOLDER/deployment.yml"
          done

          # --- Backend Service ---
          FOLDER="backend"
          REPO_NAME="shopping-site-backend"
          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "🚀 Building backend..."
          aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$REPO_NAME"

          docker build -t "$IMAGE_URI" "$FOLDER"
          docker push "$IMAGE_URI"

          sed -i "s|^\(\s*image:\s*\).*|\1$IMAGE_URI|" "$FOLDER/backend-deployment.yml"

      - name: 🔄 Commit updated YAML files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # ✅ FIX: ** glob requires globstar in bash (off by default).
          # Use find to reliably stage all frontend deployment.yml files.
          git add $(find frontend -name "deployment.yml") backend/backend-deployment.yml

          git diff --cached --quiet && echo "⚠️ No YAML changes to commit" && exit 0

          git commit -m "🔄 Update image tags after build [skip ci]"

          # ✅ FIX: Pull with rebase before push to avoid diverged branch failures
          git pull --rebase origin main
          git push origin main

      - name: 🚀 Deploy on EC2
        # ✅ Skip deploy if this run was triggered by the automated image-tag commit
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # ✅ FIX: Abort on any error; don't silently continue past failures

            echo "🔄 Starting deployment on EC2..."
            cd /home/ec2-user

            if [ -d "shopping-site" ]; then
              echo "📥 Pulling latest code..."
              cd shopping-site
              git pull origin main
            else
              echo "📦 Cloning fresh repo..."
              git clone https://github.com/${{ github.repository }} shopping-site
              cd shopping-site
            fi

            echo "🐳 Updating and restarting containers..."
            # ✅ FIX: --remove-orphans cleans up stale containers from removed services
            docker compose down --remove-orphans || true
            docker compose pull
            docker compose up -d

            echo "✅ Deployment complete!"
