name: CI/CD for Shopping Site (Frontend + Backend + ArgoCD)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com
  FRONTEND_SERVICES: "main electronics phones computers earphones googlemusic googlepay googleclothes googlegrocery"
  BACKEND_SERVICE: "backend"
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}        # e.g. argocd.yourdomain.com
  ARGOCD_APP_PREFIX: "shopping-site"                 # ArgoCD app names: shopping-site-main, shopping-site-backend, etc.

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push all Docker images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}

      - name: 🏷️ Set image tag
        id: set-tag
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🛠 Build and Push Docker Images
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"

          # ── Frontend Services ──────────────────────────────────────────────
          for service in $FRONTEND_SERVICES; do
            FOLDER="frontend/$service"
            REPO_NAME="shopping-site-$service"
            IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

            if [ ! -f "$FOLDER/Dockerfile" ]; then
              echo "⚠️  No Dockerfile in $FOLDER, skipping..."
              continue
            fi

            echo "🚀 Building $service..."
            aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$REPO_NAME"

            docker build -t "$IMAGE_URI" "$FOLDER"
            docker push "$IMAGE_URI"

            # Update deployment.yml image tag (used by ArgoCD GitOps sync)
            sed -i "s|^\(\s*image:\s*\).*|\1$IMAGE_URI|" "$FOLDER/deployment.yml"
          done

          # ── Backend Service ────────────────────────────────────────────────
          FOLDER="backend"
          REPO_NAME="shopping-site-backend"
          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "🚀 Building backend..."
          aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$REPO_NAME"

          docker build -t "$IMAGE_URI" "$FOLDER"
          docker push "$IMAGE_URI"

          sed -i "s|^\(\s*image:\s*\).*|\1$IMAGE_URI|" "$FOLDER/backend-deployment.yml"

      - name: 🔄 Commit updated YAML files (GitOps trigger)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${{ secrets.GIT_PAT }}@github.com/${{ github.repository }}

          git add $(find frontend -name "deployment.yml") backend/backend-deployment.yml

          git diff --cached --quiet && echo "⚠️ No YAML changes to commit" && exit 0

          git commit -m "🔄 Update image tags after build [skip ci]"
          git pull --rebase origin main
          git push origin main

  # ─────────────────────────────────────────────
  # JOB 2: Register ArgoCD Apps (idempotent)
  # Runs once; safe to re-run on every push.
  # ─────────────────────────────────────────────
  argocd-register-apps:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: 🔐 Login to ArgoCD
        run: |
          argocd login "$ARGOCD_SERVER" \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --insecure   # remove if you have a valid TLS cert on your ArgoCD server

      # ── Auto-register every frontend service ──────────────────────────────
      - name: 📋 Register / update frontend ArgoCD Applications
        run: |
          set -e
          REPO_URL="https://github.com/${{ github.repository }}"

          for service in $FRONTEND_SERVICES; do
            APP_NAME="${ARGOCD_APP_PREFIX}-${service}"
            PATH_IN_REPO="frontend/${service}"
            NAMESPACE="${service}"   # one namespace per service; adjust if you prefer a single ns

            echo "🔧 Ensuring namespace $NAMESPACE exists in ArgoCD..."
            argocd app create "$APP_NAME" \
              --repo         "$REPO_URL" \
              --path         "$PATH_IN_REPO" \
              --dest-server  "https://kubernetes.default.svc" \
              --dest-namespace "$NAMESPACE" \
              --revision     "main" \
              --sync-policy  automated \
              --auto-prune \
              --self-heal \
              --upsert \
            || echo "ℹ️  App $APP_NAME already exists – skipping create"

            echo "✅ $APP_NAME registered"
          done

      # ── Register backend service ───────────────────────────────────────────
      - name: 📋 Register / update backend ArgoCD Application
        run: |
          APP_NAME="${ARGOCD_APP_PREFIX}-backend"
          REPO_URL="https://github.com/${{ github.repository }}"

          argocd app create "$APP_NAME" \
            --repo          "$REPO_URL" \
            --path          "backend" \
            --dest-server   "https://kubernetes.default.svc" \
            --dest-namespace "backend" \
            --revision      "main" \
            --sync-policy   automated \
            --auto-prune \
            --self-heal \
            --upsert \
          || echo "ℹ️  App $APP_NAME already exists – skipping create"

          echo "✅ $APP_NAME registered"

  # ─────────────────────────────────────────────
  # JOB 3: Sync ArgoCD (force pull latest state)
  # ─────────────────────────────────────────────
  argocd-sync:
    runs-on: ubuntu-latest
    needs: argocd-register-apps
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: 📥 Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: 🔐 Login to ArgoCD
        run: |
          argocd login "$ARGOCD_SERVER" \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --insecure

      # ── Sync all frontend apps in parallel ────────────────────────────────
      - name: 🔄 Sync all frontend ArgoCD Applications
        run: |
          set -e
          PIDS=()

          for service in $FRONTEND_SERVICES; do
            APP_NAME="${ARGOCD_APP_PREFIX}-${service}"
            echo "🔄 Syncing $APP_NAME..."
            argocd app sync "$APP_NAME" --force --prune &
            PIDS+=($!)
          done

          # Wait for all parallel syncs and collect exit codes
          FAILED=0
          for pid in "${PIDS[@]}"; do
            wait "$pid" || FAILED=1
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ One or more frontend syncs failed"
            exit 1
          fi
          echo "✅ All frontend apps synced"

      # ── Sync backend ───────────────────────────────────────────────────────
      - name: 🔄 Sync backend ArgoCD Application
        run: |
          APP_NAME="${ARGOCD_APP_PREFIX}-backend"
          echo "🔄 Syncing $APP_NAME..."
          argocd app sync "$APP_NAME" --force --prune
          echo "✅ $APP_NAME synced"

      # ── Wait for all apps to become healthy ───────────────────────────────
      - name: ⏳ Wait for all apps to become Healthy
        run: |
          set -e
          ALL_APPS=""
          for service in $FRONTEND_SERVICES; do
            ALL_APPS="$ALL_APPS ${ARGOCD_APP_PREFIX}-${service}"
          done
          ALL_APPS="$ALL_APPS ${ARGOCD_APP_PREFIX}-backend"

          for app in $ALL_APPS; do
            echo "⏳ Waiting for $app to be healthy..."
            argocd app wait "$app" \
              --health \
              --timeout 300 \
            && echo "✅ $app is Healthy" \
            || echo "⚠️  $app did not reach Healthy within 5 min"
          done

      # ── Print final status dashboard ──────────────────────────────────────
      - name: 📊 ArgoCD Application Status
        run: |
          echo "══════════════════════════════════════"
          echo "       ArgoCD Deployment Summary      "
          echo "══════════════════════════════════════"
          for service in $FRONTEND_SERVICES; do
            APP_NAME="${ARGOCD_APP_PREFIX}-${service}"
            STATUS=$(argocd app get "$APP_NAME" --output json | \
              python3 -c "import sys,json; d=json.load(sys.stdin); \
                print(d['status']['health']['status'], '/', d['status']['sync']['status'])")
            echo "  $APP_NAME  →  $STATUS"
          done
          APP_NAME="${ARGOCD_APP_PREFIX}-backend"
          STATUS=$(argocd app get "$APP_NAME" --output json | \
            python3 -c "import sys,json; d=json.load(sys.stdin); \
              print(d['status']['health']['status'], '/', d['status']['sync']['status'])")
          echo "  $APP_NAME  →  $STATUS"
          echo "══════════════════════════════════════"
