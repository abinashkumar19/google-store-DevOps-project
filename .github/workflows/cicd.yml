name: CI/CD for Shopping Site (Frontend + Backend + ArgoCD)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com
  FRONTEND_SERVICES: "main electronics phones computers earphones googlemusic googlepay googleclothes googlegrocery"
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
  ARGOCD_APP_PREFIX: "shopping-site"

permissions:
  contents: write

jobs:

  # ================================================================
  # JOB 1 — Build Docker images and push to ECR
  # ================================================================
  build-and-push:
    name: "Build and Push Images"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}
          fetch-depth: 0

      - name: "Set image tag"
        id: set-tag
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Login to Amazon ECR"
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Build and push frontend images"
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"

          for service in ${FRONTEND_SERVICES}; do
            FOLDER="frontend/${service}"
            REPO_NAME="shopping-site-${service}"
            IMAGE_URI="${ECR_REGISTRY}/${REPO_NAME}:${IMAGE_TAG}"

            if [ ! -f "${FOLDER}/Dockerfile" ]; then
              echo "No Dockerfile found in ${FOLDER} — skipping"
              continue
            fi

            echo "Building ${service} → ${IMAGE_URI}"

            aws ecr describe-repositories \
              --repository-names "${REPO_NAME}" \
              --region "${AWS_REGION}" \
              > /dev/null 2>&1 \
              || aws ecr create-repository \
                   --repository-name "${REPO_NAME}" \
                   --region "${AWS_REGION}"

            docker build -t "${IMAGE_URI}" "${FOLDER}"
            docker push "${IMAGE_URI}"

            sed -i "s|^\(\s*image:\s*\).*|\1${IMAGE_URI}|" "${FOLDER}/deployment.yml"
            echo "Done: ${service}"
          done

      - name: "Build and push backend image"
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"
          FOLDER="backend"
          REPO_NAME="shopping-site-backend"
          IMAGE_URI="${ECR_REGISTRY}/${REPO_NAME}:${IMAGE_TAG}"

          echo "Building backend → ${IMAGE_URI}"

          aws ecr describe-repositories \
            --repository-names "${REPO_NAME}" \
            --region "${AWS_REGION}" \
            > /dev/null 2>&1 \
            || aws ecr create-repository \
                 --repository-name "${REPO_NAME}" \
                 --region "${AWS_REGION}"

          docker build -t "${IMAGE_URI}" "${FOLDER}"
          docker push "${IMAGE_URI}"

          sed -i "s|^\(\s*image:\s*\).*|\1${IMAGE_URI}|" "${FOLDER}/backend-deployment.yml"
          echo "Done: backend"

      - name: "Commit updated deployment YAML files"
        run: |
          git config --global user.name  "GitHub Actions"
          git config --global user.email "actions@github.com"

          git remote set-url origin \
            https://x-access-token:${{ secrets.GIT_PAT }}@github.com/${{ github.repository }}

          git add $(find frontend -name "deployment.yml") \
                  backend/backend-deployment.yml

          if git diff --cached --quiet; then
            echo "No YAML changes to commit"
            exit 0
          fi

          git commit -m "Update image tags [skip ci] - ${GITHUB_SHA::8}"
          git pull --rebase origin main
          git push origin main

  # ================================================================
  # JOB 2 — Register / update every ArgoCD Application (idempotent)
  # ================================================================
  argocd-register:
    name: "Register ArgoCD Applications"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Install ArgoCD CLI"
        run: |
          curl -sSL \
            -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
          argocd version --client

      - name: "Login to ArgoCD"
        run: |
          argocd login "${ARGOCD_SERVER}" \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --grpc-web \
            --insecure

      - name: "Register all frontend ArgoCD Applications"
        run: |
          set -e
          REPO_URL="https://github.com/${{ github.repository }}"

          for service in ${FRONTEND_SERVICES}; do
            APP_NAME="${ARGOCD_APP_PREFIX}-${service}"
            APP_PATH="frontend/${service}"
            NAMESPACE="${service}"

            echo "Registering ${APP_NAME} (path=${APP_PATH}, namespace=${NAMESPACE})"

            argocd app create "${APP_NAME}" \
              --repo             "${REPO_URL}" \
              --path             "${APP_PATH}" \
              --dest-server      "https://kubernetes.default.svc" \
              --dest-namespace   "${NAMESPACE}" \
              --revision         "main" \
              --sync-policy      automated \
              --auto-prune \
              --self-heal \
              --sync-option      CreateNamespace=true \
              --upsert

            echo "Registered: ${APP_NAME}"
          done

      - name: "Register backend ArgoCD Application"
        run: |
          set -e
          APP_NAME="${ARGOCD_APP_PREFIX}-backend"
          REPO_URL="https://github.com/${{ github.repository }}"

          echo "Registering ${APP_NAME} (path=backend, namespace=backend)"

          argocd app create "${APP_NAME}" \
            --repo             "${REPO_URL}" \
            --path             "backend" \
            --dest-server      "https://kubernetes.default.svc" \
            --dest-namespace   "backend" \
            --revision         "main" \
            --sync-policy      automated \
            --auto-prune \
            --self-heal \
            --sync-option      CreateNamespace=true \
            --upsert

          echo "Registered: ${APP_NAME}"

  # ================================================================
  # JOB 3 — Sync all ArgoCD Applications and wait for health
  # ================================================================
  argocd-sync:
    name: "Sync and Verify ArgoCD Apps"
    runs-on: ubuntu-latest
    needs: argocd-register
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: "Install ArgoCD CLI"
        run: |
          curl -sSL \
            -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: "Login to ArgoCD"
        run: |
          argocd login "${ARGOCD_SERVER}" \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --grpc-web \
            --insecure

      - name: "Sync all frontend apps in parallel"
        run: |
          set -e
          declare -a PIDS

          for service in ${FRONTEND_SERVICES}; do
            APP_NAME="${ARGOCD_APP_PREFIX}-${service}"
            echo "Triggering sync: ${APP_NAME}"
            argocd app sync "${APP_NAME}" \
              --force \
              --prune \
              --timeout 120 &
            PIDS+=("$!")
          done

          FAILED=0
          for pid in "${PIDS[@]}"; do
            wait "${pid}" || FAILED=1
          done

          if [ "${FAILED}" -eq 1 ]; then
            echo "One or more frontend syncs failed"
            exit 1
          fi

          echo "All frontend apps synced"

      - name: "Sync backend app"
        run: |
          APP_NAME="${ARGOCD_APP_PREFIX}-backend"
          echo "Syncing ${APP_NAME}"
          argocd app sync "${APP_NAME}" \
            --force \
            --prune \
            --timeout 120
          echo "Synced: ${APP_NAME}"

      - name: "Wait for all apps to become Healthy"
        run: |
          set -e
          ALL_APPS=""
          for service in ${FRONTEND_SERVICES}; do
            ALL_APPS="${ALL_APPS} ${ARGOCD_APP_PREFIX}-${service}"
          done
          ALL_APPS="${ALL_APPS} ${ARGOCD_APP_PREFIX}-backend"

          OVERALL_FAILED=0

          for app in ${ALL_APPS}; do
            echo "Waiting for health: ${app}"
            if argocd app wait "${app}" --health --timeout 300; then
              echo "Healthy: ${app}"
            else
              echo "FAILED health check: ${app}"
              OVERALL_FAILED=1
            fi
          done

          if [ "${OVERALL_FAILED}" -eq 1 ]; then
            echo "One or more apps failed health check"
            exit 1
          fi

      - name: "Print deployment summary"
        if: always()
        run: |
          echo "=================================================="
          echo "  ArgoCD Deployment Summary"
          echo "=================================================="

          for service in ${FRONTEND_SERVICES}; do
            APP_NAME="${ARGOCD_APP_PREFIX}-${service}"
            STATUS=$(argocd app get "${APP_NAME}" --output json 2>/dev/null | \
              python3 -c "
import sys, json
d = json.load(sys.stdin)
h = d['status']['health']['status']
s = d['status']['sync']['status']
print(f'{h} / {s}')
" 2>/dev/null || echo "UNKNOWN / UNKNOWN")
            echo "  ${APP_NAME}: ${STATUS}"
          done

          APP_NAME="${ARGOCD_APP_PREFIX}-backend"
          STATUS=$(argocd app get "${APP_NAME}" --output json 2>/dev/null | \
            python3 -c "
import sys, json
d = json.load(sys.stdin)
h = d['status']['health']['status']
s = d['status']['sync']['status']
print(f'{h} / {s}')
" 2>/dev/null || echo "UNKNOWN / UNKNOWN")
          echo "  ${APP_NAME}: ${STATUS}"
          echo "=================================================="
