name: CI/CD for Shopping Site (Frontend + Backend)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com
  FRONTEND_SERVICES: "main electronics phones computers earphones googlemusic googlepay googleclothes googlegrocery"
  BACKEND_SERVICE: "backend"
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
  ARGOCD_FRONTEND_APPS: "main electronics phones computers earphones googlemusic googlepay googleclothes googlegrocery"
  ARGOCD_APP_BACKEND: "backend"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}

      # ─────────────────────────────────────────────
      # 2. AWS credentials + ECR login
      # ─────────────────────────────────────────────
      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ─────────────────────────────────────────────
      # 3. Delete ALL old images from ECR before build
      #    Wipes every existing tag so only the new
      #    image (this commit's SHA) remains after push
      # ─────────────────────────────────────────────
      - name: 🗑 Delete old ECR images
        run: |
          set -e

          delete_all_images() {
            local REPO_NAME="$1"

            # Check repo exists first
            aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || {
              echo "⚠️ Repo $REPO_NAME does not exist yet, skipping cleanup."
              return
            }

            # Get all image digests in the repo
            IMAGE_IDS=$(aws ecr list-images \
              --repository-name "$REPO_NAME" \
              --query 'imageIds[*]' \
              --output json)

            if [ "$IMAGE_IDS" = "[]" ] || [ -z "$IMAGE_IDS" ]; then
              echo "ℹ️ No images found in $REPO_NAME, nothing to delete."
              return
            fi

            echo "🗑 Deleting all images from $REPO_NAME..."
            aws ecr batch-delete-image \
              --repository-name "$REPO_NAME" \
              --image-ids "$IMAGE_IDS" \
              --output table
            echo "✅ Cleared $REPO_NAME"
          }

          # Delete from all frontend repos
          for service in $FRONTEND_SERVICES; do
            delete_all_images "shopping-site-$service"
          done

          # Delete from backend repo
          delete_all_images "shopping-site-backend"

      # ─────────────────────────────────────────────
      # 4. Build & push fresh Docker images
      # ─────────────────────────────────────────────
      - name: 🛠 Build and Push Docker Images
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"

          # --- Frontend Services ---
          for service in $FRONTEND_SERVICES; do
            FOLDER="frontend/$service"
            REPO_NAME="shopping-site-$service"
            IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

            if [ ! -f "$FOLDER/Dockerfile" ]; then
              echo "⚠️ No Dockerfile in $FOLDER, skipping..."
              continue
            fi

            echo "🚀 Building $service..."
            aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$REPO_NAME"

            docker build -t "$IMAGE_URI" "$FOLDER"
            docker push "$IMAGE_URI"
            echo "✅ Pushed $IMAGE_URI"

            sed -i "s|^\(\s*image:\s*\).*|\1$IMAGE_URI|" "$FOLDER/deployment.yml"
          done

          # --- Backend Service ---
          FOLDER="backend"
          REPO_NAME="shopping-site-backend"
          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "🚀 Building backend..."
          aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$REPO_NAME"

          docker build -t "$IMAGE_URI" "$FOLDER"
          docker push "$IMAGE_URI"
          echo "✅ Pushed $IMAGE_URI"

          sed -i "s|^\(\s*image:\s*\).*|\1$IMAGE_URI|" "$FOLDER/backend-deployment.yml"

      # ─────────────────────────────────────────────
      # 5. Commit patched YAMLs back to Git
      # ─────────────────────────────────────────────
      - name: 🔄 Commit updated YAML files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${{ secrets.GIT_PAT }}@github.com/${{ github.repository }}

          git add $(find frontend -name "deployment.yml") backend/backend-deployment.yml

          git diff --cached --quiet && echo "⚠️ No YAML changes to commit" && exit 0

          git commit -m "🔄 Update image tags after build [skip ci]"

          git pull --rebase origin main
          git push origin main

      # ─────────────────────────────────────────────
      # 6. Validate ArgoCD secrets exist
      # ─────────────────────────────────────────────
      - name: ✅ Validate ArgoCD secrets
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        run: |
          MISSING=""
          [ -z "${{ secrets.ARGOCD_SERVER }}"   ] && MISSING="$MISSING ARGOCD_SERVER"
          [ -z "${{ secrets.ARGOCD_USERNAME }}" ] && MISSING="$MISSING ARGOCD_USERNAME"
          [ -z "${{ secrets.ARGOCD_PASSWORD }}" ] && MISSING="$MISSING ARGOCD_PASSWORD"

          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            echo "👉 Go to: Repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

          echo "✅ All ArgoCD secrets are present."

      # ─────────────────────────────────────────────
      # 7. Install ArgoCD CLI
      # ─────────────────────────────────────────────
      - name: 🔽 Install ArgoCD CLI
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
          argocd version --client

      # ─────────────────────────────────────────────
      # 8. Login to ArgoCD
      # ─────────────────────────────────────────────
      - name: 🔐 Login to ArgoCD
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        run: |
          argocd login "${{ secrets.ARGOCD_SERVER }}" \
            --username "${{ secrets.ARGOCD_USERNAME }}" \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --insecure

      # ─────────────────────────────────────────────
      # 9. Create missing ArgoCD apps (idempotent)
      # ─────────────────────────────────────────────
      - name: 🏗 Create ArgoCD Apps if Missing
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        run: |
          create_app_if_missing() {
            local APP="$1"
            local PATH_IN_REPO="$2"

            if argocd app get "$APP" >/dev/null 2>&1; then
              echo "✅ App '$APP' already exists, skipping create."
            else
              echo "➕ Creating ArgoCD app: $APP"
              argocd app create "$APP" \
                --repo "https://github.com/${{ github.repository }}.git" \
                --path "$PATH_IN_REPO" \
                --dest-server https://kubernetes.default.svc \
                --dest-namespace google \
                --sync-policy automated \
                --auto-prune \
                --self-heal \
                --insecure
              echo "✅ Created $APP"
            fi
          }

          # All frontend apps
          for service in main electronics phones computers earphones googlemusic googlepay googleclothes googlegrocery; do
            create_app_if_missing "$service" "frontend/$service"
          done

          # Backend app
          create_app_if_missing "backend" "backend"

          echo ""
          echo "📋 Current ArgoCD apps:"
          argocd app list

      # ─────────────────────────────────────────────
      # 10. Sync each Frontend App individually
      # ─────────────────────────────────────────────
      - name: 🚀 Sync Frontend Apps via ArgoCD
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        run: |
          FAILED_APPS=""
          for app in $ARGOCD_FRONTEND_APPS; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Syncing frontend app: $app"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            if ! argocd app sync "$app" --force --prune --timeout 180; then
              echo "❌ Sync failed for $app"
              FAILED_APPS="$FAILED_APPS $app"
              continue
            fi

            if ! argocd app wait "$app" --health --timeout 300; then
              echo "❌ Health check failed for $app"
              FAILED_APPS="$FAILED_APPS $app"
              continue
            fi

            echo "✅ $app synced and healthy"
          done

          if [ -n "$FAILED_APPS" ]; then
            echo "❌ The following apps failed:$FAILED_APPS"
            exit 1
          fi

      # ─────────────────────────────────────────────
      # 11. Sync Backend App
      # ─────────────────────────────────────────────
      - name: 🚀 Sync Backend App via ArgoCD
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 Syncing backend app: $ARGOCD_APP_BACKEND"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if ! argocd app sync "$ARGOCD_APP_BACKEND" --force --prune --timeout 180; then
            echo "❌ Backend sync failed"
            exit 1
          fi

          argocd app wait "$ARGOCD_APP_BACKEND" --health --timeout 300
          echo "✅ Backend synced and healthy"

      # ─────────────────────────────────────────────
      # 12. Print final status of all apps
      # ─────────────────────────────────────────────
      - name: 📊 ArgoCD App Status
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Final ArgoCD App Status"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          for app in $ARGOCD_FRONTEND_APPS $ARGOCD_APP_BACKEND; do
            echo ""
            echo "--- $app ---"
            argocd app get "$app" || echo "⚠️ App '$app' not found in ArgoCD"
          done
