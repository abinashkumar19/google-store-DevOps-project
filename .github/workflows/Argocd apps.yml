# ============================================================
#  ArgoCD Application manifests — Shopping Site
#  Apply once with:  kubectl apply -f argocd/apps/
#
#  After applying, ArgoCD auto-syncs on every git push
#  (the CI/CD workflow above also triggers argocd app sync
#   as a belt-and-suspenders approach).
# ============================================================

# ── main ────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopping-site-main
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: shopping-site
    service-type: frontend
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/YOUR_REPO   # ← replace
    targetRevision: main
    path: frontend/main
  destination:
    server: https://kubernetes.default.svc
    namespace: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true   # auto-create namespace if missing
---
