apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 181728646524.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-backend:63474aa669cbd97ef1854dae2e61b1b9c6818314
          ports:
            - containerPort: 5000
